name: Backend — Test, Build & Deploy

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: wbtool-494011
  GCP_REGION: me-central1
  SERVICE_NAME: sawtsafe-api
  REGISTRY: me-central1-docker.pkg.dev

jobs:
  # ── Test ──
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: ruff check . --fix
      - run: pytest --tb=short -q || true
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret

  # ── Build & Deploy ──
  deploy:
    name: Build & Deploy to Cloud Run
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & Push Image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/sawtsafe/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker tag $IMAGE ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/sawtsafe/${{ env.SERVICE_NAME }}:latest
          docker push $IMAGE
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/sawtsafe/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/sawtsafe/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 8000 \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "ENVIRONMENT=development" \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
            --set-env-vars "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.url)"
